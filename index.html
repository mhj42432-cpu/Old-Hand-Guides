<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #fff;
  overflow: hidden;
}
#header {
  display: flex;
  justify-content: space-between;
  width: 640px;
  padding: 10px 0;
  font-size: 18px;
}
#gameCanvas {
  border: 2px solid #333;
  background: #000;
}
#overlay {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
#overlay.active { pointer-events: all; }
#overlay h1 {
  font-size: 48px;
  color: #ff0;
  text-shadow: 2px 2px 4px #f00;
  margin-bottom: 20px;
}
#overlay p {
  font-size: 18px;
  margin: 5px 0;
}
#overlay .blink {
  animation: blink 1s infinite;
  margin-top: 30px;
  font-size: 22px;
  color: #0f0;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
#controls {
  margin-top: 15px;
  font-size: 14px;
  color: #888;
  text-align: center;
}
</style>
</head>
<body>

<div id="header">
  <span id="scoreDisplay">得分: 0</span>
  <span id="livesDisplay">生命: 3</span>
  <span id="waveDisplay">波次: 1</span>
</div>

<div style="position: relative;">
  <canvas id="gameCanvas" width="640" height="640"></canvas>
  <div id="overlay" class="active" style="top:0;left:0;width:640px;height:640px;">
    <h1>坦克大战</h1>
    <p>保卫你的基地，消灭所有敌方坦克！</p>
    <p class="blink">按 ENTER 开始游戏</p>
  </div>
</div>

<div id="controls">
  WASD / 方向键: 移动 | 空格键: 射击 | ENTER: 开始/重新开始
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');

const TILE = 40;
const COLS = canvas.width / TILE;  // 16
const ROWS = canvas.height / TILE; // 16

// Game state
let gameState = 'menu'; // menu, playing, gameOver, victory
let score = 0;
let lives = 3;
let wave = 1;
let enemiesRemaining = 0;
let totalEnemiesInWave = 0;

// Keys
const keys = {};

// Map encoding: 0=empty, 1=brick, 2=steel, 3=water, 4=base, 5=grass
let map = [];

// Entities
let player = null;
let enemies = [];
let bullets = [];
let explosions = [];
let spawnTimer = 0;
let spawnPoints = [];

// Directions: 0=up, 1=right, 2=down, 3=left
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// ========== MAP GENERATION ==========
function generateMap() {
  map = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      map[r][c] = 0;
    }
  }

  // Base at bottom center
  map[ROWS-1][7] = 4;
  map[ROWS-1][8] = 4;
  map[ROWS-2][7] = 4;
  map[ROWS-2][8] = 4;

  // Protect base with walls
  for (let c = 6; c <= 9; c++) map[ROWS-3][c] = 1;
  map[ROWS-2][6] = 1;
  map[ROWS-2][9] = 1;

  // Brick walls scattered
  const brickPatterns = [
    [2,4],[2,5],[2,6],[3,4],[3,6],
    [2,9],[2,10],[2,11],[3,9],[3,11],
    [5,2],[5,3],[5,4],[6,2],[6,4],
    [5,11],[5,12],[5,13],[6,11],[6,13],
    [7,5],[7,6],[7,9],[7,10],
    [8,2],[8,3],[8,12],[8,13],
    [9,7],[9,8],[10,5],[10,10],
    [4,7],[4,8],
  ];
  for (const [r,c] of brickPatterns) {
    if (r < ROWS && c < COLS) map[r][c] = 1;
  }

  // Steel walls
  const steelPatterns = [
    [5,7],[5,8],[6,7],[6,8],
    [1,3],[1,12],
    [10,3],[10,12],
  ];
  for (const [r,c] of steelPatterns) {
    if (r < ROWS && c < COLS) map[r][c] = 2;
  }

  // Water
  const waterPatterns = [
    [4,3],[4,4],[5,3],[5,4],
    [4,11],[4,12],[5,11],[5,12],
  ];
  for (const [r,c] of waterPatterns) {
    if (r < ROWS && c < COLS) map[r][c] = 3;
  }

  // Grass (hides tanks underneath)
  const grassPatterns = [
    [7,2],[7,3],[7,12],[7,13],
    [8,7],[8,8],[9,2],[9,3],
    [9,12],[9,13],
  ];
  for (const [r,c] of grassPatterns) {
    if (r < ROWS && c < COLS) map[r][c] = 5;
  }
}

// ========== TANK CLASS ==========
class Tank {
  constructor(x, y, dir, color, isPlayer = false) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.color = color;
    this.isPlayer = isPlayer;
    this.speed = isPlayer ? 2 : 1.2;
    this.size = TILE - 4;
    this.cooldown = 0;
    this.alive = true;
    this.moveTimer = 0;
    this.aiDir = dir;
    this.aiTimer = 0;
  }

  update() {
    if (!this.alive) return;
    if (this.cooldown > 0) this.cooldown--;

    if (this.isPlayer) {
      this.handleInput();
    } else {
      this.handleAI();
    }
  }

  handleInput() {
    let dx = 0, dy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) { dy = -1; this.dir = 0; }
    else if (keys['KeyS'] || keys['ArrowDown']) { dy = 1; this.dir = 2; }
    else if (keys['KeyA'] || keys['ArrowLeft']) { dx = -1; this.dir = 3; }
    else if (keys['KeyD'] || keys['ArrowRight']) { dx = 1; this.dir = 1; }

    if (dx !== 0 || dy !== 0) {
      this.move(dx * this.speed, dy * this.speed);
    }

    if (keys['Space']) {
      this.shoot();
    }
  }

  handleAI() {
    this.aiTimer--;
    if (this.aiTimer <= 0) {
      // Change direction randomly or towards player
      if (player && player.alive && Math.random() < 0.4) {
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        if (Math.abs(dx) > Math.abs(dy)) {
          this.aiDir = dx > 0 ? 1 : 3;
        } else {
          this.aiDir = dy > 0 ? 2 : 0;
        }
      } else {
        this.aiDir = Math.floor(Math.random() * 4);
      }
      this.aiTimer = 60 + Math.random() * 120;
    }

    this.dir = this.aiDir;
    const moved = this.move(DX[this.dir] * this.speed, DY[this.dir] * this.speed);

    if (!moved || this.hitWall()) {
      this.aiDir = Math.floor(Math.random() * 4);
      this.aiTimer = 30;
    }

    // Shoot randomly
    if (Math.random() < 0.02) {
      this.shoot();
    }
  }

  hitWall() {
    const half = this.size / 2;
    const cx = this.x;
    const cy = this.y;
    const tc = Math.floor(cx / TILE);
    const tr = Math.floor(cy / TILE);

    for (let r = tr - 1; r <= tr + 1; r++) {
      for (let c = tc - 1; c <= tc + 1; c++) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
        const t = map[r][c];
        if (t === 1 || t === 2 || t === 4) {
          // Check collision with tank bounds
          const wx = c * TILE, wy = r * TILE;
          if (cx + half > wx && cx - half < wx + TILE &&
              cy + half > wy && cy - half < wy + TILE) {
            return true;
          }
        }
        if (t === 3) { // Water - tanks can't pass
          const wx = c * TILE, wy = r * TILE;
          if (cx + half > wx && cx - half < wx + TILE &&
              cy + half > wy && cy - half < wy + TILE) {
            return true;
          }
        }
      }
    }
    return false;
  }

  move(dx, dy) {
    const newX = this.x + dx;
    const newY = this.y + dy;
    const half = this.size / 2;

    // Boundary check
    if (newX - half < 0 || newX + half > canvas.width ||
        newY - half < 0 || newY + half > canvas.height) {
      return false;
    }

    // Map collision
    const oldX = this.x, oldY = this.y;
    this.x = newX;
    this.y = newY;

    if (this.hitWall()) {
      this.x = oldX;
      this.y = oldY;
      return false;
    }

    // Tank-tank collision
    const allTanks = [player, ...enemies].filter(t => t && t.alive && t !== this);
    for (const other of allTanks) {
      if (Math.abs(this.x - other.x) < this.size &&
          Math.abs(this.y - other.y) < this.size) {
        this.x = oldX;
        this.y = oldY;
        return false;
      }
    }

    return true;
  }

  shoot() {
    if (this.cooldown > 0) return;
    this.cooldown = this.isPlayer ? 15 : 40;

    const bx = this.x + DX[this.dir] * (this.size / 2 + 4);
    const by = this.y + DY[this.dir] * (this.size / 2 + 4);
    bullets.push(new Bullet(bx, by, this.dir, this.isPlayer));
  }

  draw() {
    if (!this.alive) return;

    // Check if hidden by grass (only enemies hidden)
    const tc = Math.floor(this.x / TILE);
    const tr = Math.floor(this.y / TILE);
    let inGrass = false;
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      inGrass = map[tr][tc] === 5;
    }
    if (inGrass && !this.isPlayer) return; // Hide in grass

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.dir * Math.PI / 2);

    // Tank body
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);

    // Tank tracks
    ctx.fillStyle = this.isPlayer ? '#0a0' : '#666';
    ctx.fillRect(-this.size/2 - 2, -this.size/2, 4, this.size);
    ctx.fillRect(this.size/2 - 2, -this.size/2, 4, this.size);

    // Turret
    ctx.fillStyle = this.isPlayer ? '#0f0' : '#aaa';
    ctx.fillRect(-4, -this.size/2 - 8, 8, 16);

    // Turret base
    ctx.fillStyle = this.isPlayer ? '#0c0' : '#888';
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// ========== BULLET CLASS ==========
class Bullet {
  constructor(x, y, dir, fromPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.speed = 5;
    this.fromPlayer = fromPlayer;
    this.alive = true;
    this.size = 6;
  }

  update() {
    this.x += DX[this.dir] * this.speed;
    this.y += DY[this.dir] * this.speed;

    // Out of bounds
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
      this.alive = false;
      return;
    }

    // Map collision
    const tc = Math.floor(this.x / TILE);
    const tr = Math.floor(this.y / TILE);

    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      const tile = map[tr][tc];
      if (tile === 1) { // Brick - destroy
        map[tr][tc] = 0;
        this.alive = false;
        addExplosion(tc * TILE + TILE/2, tr * TILE + TILE/2, 'small');
        return;
      }
      if (tile === 2) { // Steel - bullet dies, wall stays
        this.alive = false;
        addExplosion(this.x, this.y, 'small');
        return;
      }
      if (tile === 4) { // Base - game over!
        map[tr][tc] = 0;
        this.alive = false;
        addExplosion(tc * TILE + TILE/2, tr * TILE + TILE/2, 'big');
        gameOver();
        return;
      }
    }

    // Hit tanks
    const targets = this.fromPlayer ? enemies : [player];
    for (const tank of targets) {
      if (!tank || !tank.alive) continue;
      if (Math.abs(this.x - tank.x) < tank.size/2 + this.size/2 &&
          Math.abs(this.y - tank.y) < tank.size/2 + this.size/2) {
        this.alive = false;
        tank.alive = false;
        addExplosion(tank.x, tank.y, 'big');

        if (this.fromPlayer) {
          score += 100;
          enemiesRemaining--;
          if (enemiesRemaining <= 0 && enemies.every(e => !e.alive)) {
            // Wave cleared
            wave++;
            if (wave > 5) {
              victory();
            } else {
              startWave();
            }
          }
        } else {
          lives--;
          if (lives <= 0) {
            gameOver();
          } else {
            // Respawn player
            setTimeout(() => {
              if (gameState === 'playing') {
                player = new Tank(5 * TILE, (ROWS-1) * TILE, 0, '#0f0', true);
              }
            }, 1000);
          }
        }
        return;
      }
    }

    // Bullet vs bullet
    for (const other of bullets) {
      if (other === this || !other.alive) continue;
      if (this.fromPlayer === other.fromPlayer) continue;
      if (Math.abs(this.x - other.x) < this.size && Math.abs(this.y - other.y) < this.size) {
        this.alive = false;
        other.alive = false;
        return;
      }
    }
  }

  draw() {
    ctx.fillStyle = this.fromPlayer ? '#ff0' : '#f88';
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size/2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ========== EXPLOSION ==========
function addExplosion(x, y, type) {
  explosions.push({
    x, y, type,
    frame: 0,
    maxFrames: type === 'big' ? 20 : 10,
  });
}

// ========== GAME FLOW ==========
function startWave() {
  generateMap();
  enemies = [];
  bullets = [];
  explosions = [];

  spawnPoints = [
    { x: TILE, y: TILE },
    { x: 7 * TILE, y: TILE },
    { x: 14 * TILE, y: TILE },
  ];

  totalEnemiesInWave = 4 + wave * 2;
  enemiesRemaining = totalEnemiesInWave;
  spawnTimer = 0;

  // Spawn first batch
  for (let i = 0; i < Math.min(3, totalEnemiesInWave); i++) {
    spawnEnemy(i);
  }
}

function spawnEnemy(index) {
  if (enemiesRemaining <= 0) return;
  const sp = spawnPoints[index % spawnPoints.length];

  // Check spawn point is clear
  for (const e of enemies) {
    if (e.alive && Math.abs(e.x - sp.x) < TILE && Math.abs(e.y - sp.y) < TILE) {
      return; // Don't spawn on another enemy
    }
  }

  const colors = ['#f00', '#f80', '#f0f', '#80f'];
  const enemy = new Tank(sp.x + TILE/2, sp.y + TILE/2, 2, colors[index % colors.length]);
  enemy.speed = 0.8 + wave * 0.2;
  enemies.push(enemy);
}

function gameOver() {
  gameState = 'gameOver';
  showOverlay('游戏结束', `最终得分: ${score}`, '按 ENTER 重新开始');
}

function victory() {
  gameState = 'victory';
  showOverlay('胜利！', `最终得分: ${score}`, '按 ENTER 重新开始');
}

function showOverlay(title, subtitle, hint) {
  overlay.className = 'active';
  overlay.innerHTML = `
    <h1>${title}</h1>
    <p>${subtitle}</p>
    <p class="blink">${hint}</p>
  `;
}

function startGame() {
  score = 0;
  lives = 3;
  wave = 1;
  gameState = 'playing';
  overlay.className = '';
  overlay.innerHTML = '';
  generateMap();
  player = new Tank(5 * TILE, (ROWS-1) * TILE, 0, '#0f0', true);
  enemies = [];
  bullets = [];
  explosions = [];
  startWave();
}

// ========== DRAWING ==========
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * TILE, y = r * TILE;
      switch (map[r][c]) {
        case 0: break; // Empty
        case 1: // Brick
          ctx.fillStyle = '#a52a2a';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.strokeStyle = '#8b4513';
          ctx.lineWidth = 1;
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(x, y + i * 10);
            ctx.lineTo(x + TILE, y + i * 10);
            ctx.stroke();
          }
          for (let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(x + i * 10, y);
            ctx.lineTo(x + i * 10, y + TILE);
            ctx.stroke();
          }
          break;
        case 2: // Steel
          ctx.fillStyle = '#ccc';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = '#aaa';
          ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
          ctx.fillStyle = '#eee';
          ctx.fillRect(x + 5, y + 5, 8, 8);
          break;
        case 3: // Water
          ctx.fillStyle = '#2266cc';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = '#4488ee';
          const waveOff = Math.sin(Date.now() / 300 + c + r) * 4;
          ctx.fillRect(x + 5, y + 10 + waveOff, 15, 3);
          ctx.fillRect(x + 20, y + 20 - waveOff, 12, 3);
          break;
        case 4: // Base
          ctx.fillStyle = '#ff0';
          ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
          ctx.fillStyle = '#fa0';
          ctx.beginPath();
          ctx.arc(x + TILE/2, y + TILE/2, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#f00';
          ctx.font = '16px monospace';
          ctx.fillText('★', x + 10, y + 26);
          break;
        case 5: // Grass
          ctx.fillStyle = '#0a0';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = '#0c0';
          for (let i = 0; i < 5; i++) {
            ctx.fillRect(x + Math.random() * TILE, y + Math.random() * TILE, 4, 4);
          }
          break;
      }
    }
  }
}

function drawExplosions() {
  for (const exp of explosions) {
    const progress = exp.frame / exp.maxFrames;
    const radius = exp.type === 'big' ? 30 * progress : 15 * progress;
    const alpha = 1 - progress;

    ctx.fillStyle = `rgba(255, ${Math.floor(200 * (1 - progress))}, 0, ${alpha})`;
    ctx.beginPath();
    ctx.arc(exp.x, exp.y, radius, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = `rgba(255, 255, 100, ${alpha})`;
    ctx.beginPath();
    ctx.arc(exp.x, exp.y, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();

    exp.frame++;
  }
  explosions = explosions.filter(e => e.frame < e.maxFrames);
}

// ========== UI UPDATE ==========
function updateUI() {
  document.getElementById('scoreDisplay').textContent = `得分: ${score}`;
  document.getElementById('livesDisplay').textContent = `生命: ${lives}`;
  document.getElementById('waveDisplay').textContent = `波次: ${wave} | 剩余敌人: ${enemiesRemaining}`;
}

// ========== GAME LOOP ==========
function update() {
  if (gameState !== 'playing') return;

  if (player) player.update();

  // Spawn enemies
  if (enemiesRemaining > 0) {
    spawnTimer++;
    if (spawnTimer > 120) {
      spawnTimer = 0;
      const aliveEnemies = enemies.filter(e => e.alive).length;
      if (aliveEnemies < 4) {
        spawnEnemy(totalEnemiesInWave - enemiesRemaining + aliveEnemies);
      }
    }
  }

  for (const e of enemies) e.update();
  for (const b of bullets) b.update();
  bullets = bullets.filter(b => b.alive);

  updateUI();
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawMap();
  drawExplosions();

  if (player) player.draw();
  for (const e of enemies) e.draw();
  for (const b of bullets) b.draw();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// ========== INPUT ==========
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (e.code === 'Enter') {
    if (gameState === 'menu' || gameState === 'gameOver' || gameState === 'victory') {
      startGame();
    }
  }

  // Prevent scrolling
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ========== START ==========
gameLoop();
</script>
</body>
</html>
